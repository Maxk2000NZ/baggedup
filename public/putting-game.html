<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BaggedUp Putting Pro | NZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #f97316; --bg: #080b12; --sky: #0ea5e9; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'DM Sans', sans-serif; }
        canvas { display: block; touch-action: none; }
        
        /* Disc Golf Valley Style UI */
        .game-ui { position: absolute; inset: 0; pointer-events: none; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; z-index: 10; }
        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; }
        .hole-info { background: rgba(0,0,0,0.6); padding: 10px 20px; border-left: 4px solid var(--orange); }
        .hole-name { font-family: 'Bebas Neue'; font-size: 2rem; margin: 0; line-height: 1; color: white; }
        .hole-dist { font-size: 0.9rem; color: var(--orange); text-transform: uppercase; font-weight: bold; }
        
        .score-card { text-align: right; font-family: 'Bebas Neue'; font-size: 1.5rem; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .power-meter { position: absolute; left: 30px; bottom: 50px; width: 12px; height: 200px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; }
        .power-fill { width: 100%; height: 0%; background: var(--orange); position: absolute; bottom: 0; transition: height 0.1s; }

        .overlay { position: absolute; inset: 0; background: rgba(8,11,18,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; backdrop-filter: blur(10px); }
        .overlay h2 { font-family: 'Bebas Neue'; font-size: 5rem; color: white; margin: 0; }
        .overlay p { font-size: 1.2rem; color: var(--orange); margin-bottom: 20px; }
        .btn { padding: 12px 40px; background: var(--orange); color: white; border: none; border-radius: 5px; cursor: pointer; font-family: 'Bebas Neue'; font-size: 1.8rem; }
    </style>
</head>
<body>

    <div class="game-ui">
        <div class="top-bar">
            <div class="hole-info">
                <p id="h-name" class="hole-name">LAKE TEKAPO</p>
                <p id="h-dist" class="hole-dist">12 Meters</p>
            </div>
            <div class="score-card">
                SCORE: <span id="total-score">0</span><br>
                SHOT: <span id="throw-num">1</span>/3
            </div>
        </div>
        <div class="power-meter"><div id="p-fill" class="power-fill"></div></div>
    </div>

    <div id="overlay" class="overlay">
        <h2 id="msg-title">BIRDIE</h2>
        <p id="msg-body">In the chains!</p>
        <button class="btn" onclick="nextAction()">CONTINUE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const pFill = document.getElementById('p-fill');

        let width, height;
        let hole = 1, throws = 0, totalScore = 0;
        let isDragging = false, dragStart = {x:0, y:0};
        
        // Physics Consts
        const GRAVITY = 0.15;
        const AIR_RESISTANCE = 0.985;

        let disc = { x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0, active: false, tilt: 0, spin: 0 };
        let basket = { x: 0, y: -120, z: 500 };

        const holes = [
            { name: "Lake Tekapo", sky: "#0ea5e9", ground: "#15803d", lake: "#7dd3fc", dist: 400, xOff: 0 },
            { name: "Milford Sound", sky: "#334155", ground: "#064e3b", lake: "#0f172a", dist: 650, xOff: -80 },
            { name: "Mount Cook", sky: "#bae6fd", ground: "#f1f5f9", lake: "#e2e8f0", dist: 350, xOff: 120 }
        ];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            resetDisc();
            updateHoleUI();
        }

        function updateHoleUI() {
            const h = holes[hole-1];
            document.getElementById('h-name').innerText = h.name.toUpperCase();
            document.getElementById('h-dist').innerText = (h.dist/40).toFixed(0) + " Meters";
            basket.z = h.dist;
            basket.x = h.xOff;
        }

        function resetDisc() {
            disc.x = 0; disc.y = 0; disc.z = 0;
            disc.vx = 0; disc.vy = 0; disc.vz = 0;
            disc.active = false; disc.tilt = 0; disc.spin = 0;
            pFill.style.height = '0%';
        }

        const getInputPos = (e) => ({
            x: e.touches ? e.touches[0].clientX : e.clientX,
            y: e.touches ? e.touches[0].clientY : e.clientY
        });

        window.addEventListener('mousedown', (e) => {
            if (disc.active || overlay.style.display === 'flex') return;
            isDragging = true; dragStart = getInputPos(e);
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let currentY = getInputPos(e).y;
            let power = Math.min(100, Math.max(0, (dragStart.y - currentY) / 3));
            pFill.style.height = power + '%';
        });

        window.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            const end = getInputPos(e);
            
            disc.vz = (dragStart.y - end.y) * 0.15;
            disc.vx = (end.x - dragStart.x) * 0.06;
            disc.vy = -disc.vz * 0.25; // Vertical launch angle

            if (disc.vz > 4) {
                disc.active = true;
                throws++;
                document.getElementById('throw-num').innerText = throws;
            } else {
                resetDisc();
            }
        });

        function drawBasket(bx, by, scale) {
            ctx.save();
            ctx.translate(bx, by);
            ctx.scale(scale, scale);
            
            // Pole
            ctx.fillStyle = "#475569";
            ctx.fillRect(-2, -150, 4, 150);
            
            // Chains (Detailed)
            ctx.strokeStyle = "#94a3b8";
            ctx.lineWidth = 1.5;
            for(let i=0; i<5; i++) {
                ctx.beginPath();
                ctx.moveTo(-25 + (i*12.5), -140);
                ctx.quadraticCurveTo(0, -70, -25 + (i*12.5), -60);
                ctx.stroke();
            }
            
            // Top Band
            ctx.fillStyle = "#f97316"; // Signature BaggedUp Orange
            ctx.fillRect(-30, -150, 60, 10);
            
            // Basket Cage
            ctx.fillStyle = "#334155";
            ctx.beginPath();
            ctx.moveTo(-40, -60); ctx.lineTo(40, -60);
            ctx.lineTo(30, -10); ctx.lineTo(-30, -10);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
        }

        function drawDisc(dx, dy, scale) {
            ctx.save();
            ctx.translate(dx, dy);
            ctx.scale(scale, scale);
            
            // Disc Edge (3D Effect)
            ctx.fillStyle = "#ea6c0a";
            ctx.beginPath();
            ctx.ellipse(0, 5, 50, 15, 0, 0, Math.PI * 2);
            ctx.fill();

            // Disc Top
            ctx.fillStyle = "#f97316";
            ctx.beginPath();
            ctx.ellipse(0, 0, 50, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Highlight
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            ctx.beginPath();
            ctx.ellipse(-10, -3, 20, 5, 0.2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function loop() {
            const h = holes[hole-1];
            
            // Background
            ctx.fillStyle = h.sky;
            ctx.fillRect(0, 0, width, height/2);
            ctx.fillStyle = h.ground;
            ctx.fillRect(0, height/2, width, height/2);

            // 3D Projection Calculations
            const camFocal = 400;
            
            // Update Disc Physics
            if (disc.active) {
                disc.x += disc.vx;
                disc.y += disc.vy;
                disc.z += disc.vz;
                disc.vy += GRAVITY;
                disc.vx *= AIR_RESISTANCE;
                disc.vz *= AIR_RESISTANCE;

                // Collision Logic
                let distToBasket = Math.sqrt((disc.x - basket.x)**2 + (disc.z - basket.z)**2);
                if (distToBasket < 40 && disc.y < basket.y + 50 && disc.y > basket.y - 100) {
                    totalScore += (4 - throws) * 100;
                    document.getElementById('total-score').innerText = totalScore;
                    showOverlay("PUTT MADE", "Birdie! Great flight path.");
                    disc.active = false;
                }

                if (disc.z > basket.z + 200 || disc.y > 200) {
                    if (throws >= 3) showOverlay("HOLE COMPLETE", "Finalizing your scorecard...");
                    else resetDisc();
                }
            }

            // Render Basket
            let bScale = camFocal / (basket.z);
            let bx = width/2 + basket.x * bScale;
            let by = height/2 + 100 * bScale;
            drawBasket(bx, by, bScale);

            // Render Disc
            let dScale = camFocal / (disc.z + camFocal);
            let dx = width/2 + disc.x * dScale;
            let dy = height - 150 + (disc.y * dScale);
            if (disc.active || !isDragging) {
                drawDisc(dx, dy, dScale * (disc.active ? 1 : 1.5));
            }

            requestAnimationFrame(loop);
        }

        function showOverlay(t, b) {
            document.getElementById('msg-title').innerText = t;
            document.getElementById('msg-body').innerText = b;
            overlay.style.display = 'flex';
        }

        function nextAction() {
            overlay.style.display = 'none';
            if (throws >= 3) {
                if (hole >= 3) {
                    alert("Tournament Finished! Final Score: " + totalScore);
                    window.location.href = "/index.html";
                } else {
                    hole++; throws = 0;
                    document.getElementById('throw-num').innerText = 1;
                    updateHoleUI();
                    resetDisc();
                }
            } else {
                resetDisc();
            }
        }

        window.addEventListener('resize', init);
        init();
        loop();
    </script>
</body>
</html>
