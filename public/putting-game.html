<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ Putting Challenge | BaggedUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #f97316;
            --bg: #080b12;
            --text: #f1f5f9;
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--bg); font-family: 'DM Sans', sans-serif;
            color: var(--text);
        }
        canvas { display: block; background: linear-gradient(to bottom, #7dd3fc, #15803d); }
        
        /* UI Overlay */
        .game-ui {
            position: absolute; top: 0; left: 0; right: 0; padding: 1.5rem;
            display: flex; justify-content: space-between; pointer-events: none;
            z-index: 5;
        }
        .stats { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.05em; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .stats span { color: var(--orange); }

        .message-overlay {
            position: absolute; inset: 0; background: rgba(8,11,18,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; z-index: 10;
        }
        .message-overlay h2 { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; margin: 0; color: var(--orange); }
        .btn {
            margin-top: 1.5rem; padding: 0.8rem 2.5rem; background: var(--orange);
            color: white; border: none; border-radius: 999px; cursor: pointer;
            font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; pointer-events: auto;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="game-ui">
        <div class="stats">Hole: <span id="hole-num">1</span>/3</div>
        <div class="stats">Throws: <span id="throw-num">0</span>/3</div>
        <div class="stats">Score: <span id="total-score">0</span></div>
    </div>

    <div id="overlay" class="message-overlay">
        <h2 id="msg-title">Hole Complete!</h2>
        <p id="msg-body">Nice putt.</p>
        <button class="btn" onclick="nextAction()">Continue</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const holeEl = document.getElementById('hole-num');
        const throwEl = document.getElementById('throw-num');
        const scoreEl = document.getElementById('total-score');
        const overlay = document.getElementById('overlay');

        let width, height;
        let hole = 1, throws = 0, score = 0;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };
        
        // Physics Objects
        let disc = { x: 0, y: 0, vx: 0, vy: 0, radius: 18, active: false };
        let basket = { x: 0, y: 180, width: 70, height: 90 };

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            resetDisc();
            basket.x = width / 2;
        }

        function resetDisc() {
            disc.x = width / 2;
            disc.y = height - 120;
            disc.vx = 0;
            disc.vy = 0;
            disc.active = false;
        }

        // Input Handling
        const handleStart = (e) => {
            if (disc.active || overlay.style.display === 'flex') return;
            isDragging = true;
            const pos = getPos(e);
            dragStart = pos;
            dragCurrent = pos;
        };

        const handleMove = (e) => {
            if (!isDragging) return;
            dragCurrent = getPos(e);
        };

        const handleEnd = (e) => {
            if (!isDragging) return;
            isDragging = false;
            const pos = getPos(e);
            
            // Launch Vector (Inverted)
            disc.vx = (dragStart.x - pos.x) * 0.12;
            disc.vy = (dragStart.y - pos.y) * 0.12;
            
            if (Math.abs(disc.vx) > 1 || Math.abs(disc.vy) > 1) {
                disc.active = true;
                throws++;
                throwEl.innerText = throws;
            }
        };

        function getPos(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX, y: clientY };
        }

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', handleStart);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleEnd);

        function update() {
            if (disc.active) {
                disc.x += disc.vx;
                disc.y += disc.vy;
                disc.vy += 0.25; // Gravity
                disc.vx *= 0.98; // Friction

                // Collision Detection with Basket
                if (disc.x > basket.x - 35 && disc.x < basket.x + 35 &&
                    disc.y > basket.y && disc.y < basket.y + 60) {
                    
                    score += 50;
                    scoreEl.innerText = score;
                    disc.active = false;
                    showOverlay("Chains!", "+50 Points");
                }

                // Reset if off screen
                if (disc.y > height + 50 || disc.x < -50 || disc.x > width + 50 || disc.y < -500) {
                    if (throws >= 3) {
                        showOverlay("End of Hole " + hole, "Move to the next pin.");
                    } else {
                        resetDisc();
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // NZ Landscape (Mount Cook style)
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            ctx.beginPath();
            ctx.moveTo(width * 0.1, height * 0.7);
            ctx.lineTo(width * 0.3, height * 0.3);
            ctx.lineTo(width * 0.5, height * 0.7);
            ctx.fill();

            // Basket
            ctx.fillStyle = "#cbd5e1";
            ctx.fillRect(basket.x - 30, basket.y, 60, 5); // Top
            ctx.fillRect(basket.x - 2, basket.y, 4, 100);  // Pole
            ctx.fillStyle = "#94a3b8";
            ctx.fillRect(basket.x - 35, basket.y + 40, 70, 25); // Cage

            // Disc
            ctx.fillStyle = "#f97316";
            ctx.beginPath();
            ctx.arc(disc.x, disc.y, disc.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Drag Indicator
            if (isDragging) {
                ctx.strokeStyle = "white";
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(dragStart.x, dragStart.y);
                ctx.lineTo(dragCurrent.x, dragCurrent.y);
                ctx.stroke();
            }

            update();
            requestAnimationFrame(draw);
        }

        function showOverlay(title, body) {
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-body').innerText = body;
            overlay.style.display = 'flex';
        }

        function nextAction() {
            overlay.style.display = 'none';
            resetDisc();
            if (throws >= 3) {
                if (hole >= 3) {
                    alert("Course Finished! Score: " + score);
                    window.location.href = "/index.html";
                } else {
                    hole++;
                    throws = 0;
                    holeEl.innerText = hole;
                    throwEl.innerText = throws;
                }
            }
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
